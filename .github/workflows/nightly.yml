name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc-14
            cpp_compiler: g++-14
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up MSVC
      if: matrix.os == 'windows-latest'
      uses: egor-tensin/vs-shell@v2
      with:
        arch: x64

    - name: Install GCC 14 (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y g++-14
    
    - name: Configure (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: cmake -S . -G Ninja -B build -DASSEMBLY=OFF -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} --preset macos-arm64-rel

    - name: Configure 
      if: matrix.os != 'macos-latest'
      shell: bash
      run: cmake -S . -G Ninja -B build -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      shell: bash
      run: cmake --build build --config Release

    - name: Install 
      shell: bash
      run: cmake --install build --prefix install

    - name: Upload Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-${{ matrix.os }}
        path: ${{ github.workspace }}/install
        retention-days: 2
